                constellEdges = buildConstellEdges();
                conOutline = bindConstellationOutline(constellEdges);
                conLine = bindConstellationLines(constellEdges);
                rS();
            }
            let lastMSTRecompute = performance.now();
            const MST_RECOMPUTE_MS = 160;

            // Star trail
            const sorted = [...starNodes].sort((a, b) => a.week - b.week);
            function drawTrail() {
                stL.selectAll("*").remove();
                stL.append("path")
                    .attr(
                        "d",
                        d3
                            .line()
                            .x((d) => d.x)
                            .y((d) => d.y)
                            .curve(d3.curveCatmullRom.alpha(0.5))(sorted),
                    )
                    .attr("fill", "none")
                    .attr("stroke", "rgba(255,255,255,0.018)")
                    .attr("stroke-width", 0.6);
            }

            // Tick
            let dt = null;
            sim.on("tick", () => {
                lk.attr("x1", (e) => e.source.x)
                    .attr("y1", (e) => e.source.y)
                    .attr("x2", (e) => e.target.x)
                    .attr("y2", (e) => e.target.y);
                lkH.attr("x1", (e) => e.source.x)
                    .attr("y1", (e) => e.source.y)
                    .attr("x2", (e) => e.target.x)
                    .attr("y2", (e) => e.target.y);
                nd.attr("transform", (d) => `translate(${d.x},${d.y})`);
                thL.attr("x", (d) => d.x).attr("y", (d) => d.y);
                aLn.attr("x1", (d) => d.x)
                    .attr("y1", (d) => d.y)
                    .attr("x2", (d) => d.anchorX)
                    .attr("y2", (d) => d.anchorY);
                // Constellation lines update in real-time
                conOutline
                    .attr("x1", (d) => d.source.x)
                    .attr("y1", (d) => d.source.y)
                    .attr("x2", (d) => d.target.x)
                    .attr("y2", (d) => d.target.y);
                conLine
                    .attr("x1", (d) => d.source.x)
                    .attr("y1", (d) => d.source.y)
                    .attr("x2", (d) => d.target.x)
                    .attr("y2", (d) => d.target.y);
                // Throttle MST topology updates so startup does not keep stale edges.
                const now = performance.now();
                if (now - lastMSTRecompute >= MST_RECOMPUTE_MS) {
                    recomputeConstell();
                    lastMSTRecompute = now;
                }
                // Star trail (debounced)
                if (dt) clearTimeout(dt);
                dt = setTimeout(drawTrail, 300);
            });
            sim.on("end", () => {
                recomputeConstell();
                drawTrail();
            });

            // Rotation
            let lt2 = performance.now();
            let lastAnchorSync = lt2;
            const ANCHOR_SYNC_MS = 90;
            function anim(now) {
                const delta = (now - lt2) / 1000;
                lt2 = now;
                if (P.rot > 0.001) {
                    rotA += P.rot * delta * 0.05;
                    setOrbitVisualRotation();
                    if (now - lastAnchorSync >= ANCHOR_SYNC_MS) {
                        syncOrbitAnchors();
                        if (sim.alpha() < 0.08) sim.alpha(0.08).restart();
                        lastAnchorSync = now;
                    }
                }
                requestAnimationFrame(anim);
            }
            requestAnimationFrame(anim);

            // Zoom
            const zoomBehavior = d3
                .zoom()
                .filter((event) => {
                    const touchUI =
                        window.matchMedia instanceof Function &&
                        (window.matchMedia("(max-width: 900px)").matches ||
                            window.matchMedia("(pointer: coarse)").matches);
                    if (touchUI && (tp.classList.contains("mobile-sheet") || tipPinnedId)) {
                        return false;
                    }
                    return true;
                })
                .scaleExtent([0.3, 5])
                .on("start", () => vw.classList.add("is-panning"))
                .on("end", () => vw.classList.remove("is-panning"))
                .on("zoom", (e) => vp.attr("transform", e.transform));
            svg.call(zoomBehavior).on("dblclick.zoom", null);

            // Tooltip
            function esc(v) {
                return String(v ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/\"/g, "&quot;");
            }
            function refreshActiveTooltip() {
                const activeId = tipPinnedId || hId;
                if (!activeId) return;
                const d = nM.get(activeId);
                if (!d) return;
                tp.innerHTML = tHtml(d, { pinned: !!tipPinnedId });
                setTooltipState(true, !!tipPinnedId);
            }
            function tHtml(d, { pinned = false } = {}) {
                const raw = originalContent[d.id] || {};
                const title = d.title || raw.title || "";
                const question = raw.question || d.question_essence || "";
                const body = raw.body || d.content || "";
                const imageCandidates = getTooltipImageCandidates(d, raw);
                const summary =
                    summaryOverrides[d.id] ||
                    d.answer_essence ||
                    d.metaphor ||
                    "";
                const [primaryImage = "", ...fallbackImages] =
                    imageCandidates.map(encodeTooltipSrc);
                const coverHtml = primaryImage
                    ? `<div class="cover-wrap"><img class="cover" src="${esc(primaryImage)}" alt="${esc(title)}"${
                          fallbackImages.length
                              ? ` data-fallbacks="${esc(fallbackImages.join("||"))}" onerror="handleTooltipCoverError(this)"`
                              : ""
                      }></div>`
                    : "";
                const bodyClass = primaryImage ? "body has-cover" : "body";
                return `<div class="tooltip-head"><div><h2 style="color:${d.color}">${esc(title)}</h2><div class="week-num">Week ${d.week} · ${esc(d.cluster_label || "")} · ${esc(d.created_at || "")}</div></div>${pinned ? `<button type="button" class="tooltip-close" data-role="tooltip-close" aria-label="关闭">×</button>` : ""}</div>${question ? `<div class="question">${esc(question)}</div>` : ""}${coverHtml}${body ? `<div class="${bodyClass}">${esc(body)}</div>` : ""}${summary ? `<div class="summary">${esc(summary)}</div>` : ""}`;
            }
            function mvTip(el, e) {
                const g = 18,
                    bw = el.offsetWidth || 360,
                    bh = el.offsetHeight || 220;
                let l = e.clientX + g,
                    t = e.clientY + g;
                if (l + bw > innerWidth - 12) l = e.clientX - bw - g;
                if (t + bh > innerHeight - 12) t = e.clientY - bh - g;
                el.style.left = Math.max(12, l) + "px";
                el.style.top = Math.max(12, t) + "px";
            }

            // Interaction
            let acId = "all",
                hId = null,
                pinnedId = null,
                tipPinnedId = null;
            const weekNodeId = {};
            starNodes.forEach((n) => {
                weekNodeId[n.week] = n.id;
            });
            function isTouchUI() {
                if (!(window.matchMedia instanceof Function)) return false;
                return (
                    window.matchMedia("(max-width: 900px)").matches ||
                    window.matchMedia("(pointer: coarse)").matches
                );
            }
            function setTooltipState(visible, pinned) {
                const mobileSheet = visible && isTouchUI();
                tp.classList.toggle("visible", visible);
                tp.classList.toggle("pinned", !!pinned || mobileSheet);
                tp.classList.toggle("mobile-sheet", mobileSheet);
                tpBackdrop.classList.toggle("visible", mobileSheet);
                vw.classList.toggle("tooltip-locked", mobileSheet);
                if (mobileSheet) {
                    tp.style.left = "";
                    tp.style.top = "";
                }
            }
            function renderTooltip(d, e, { pinned = false } = {}) {
                tp.innerHTML = tHtml(d, { pinned });
                setTooltipState(true, pinned);
                if (e && !isTouchUI()) mvTip(tp, e);
            }
            function pinNode(nid, { showTooltip = false, event = null } = {}) {
                if (!nid) return;
                pinnedId = nid;
                tipPinnedId = showTooltip ? nid : null;
                if (showTooltip) {
                    const d = nM.get(nid);
                    if (d) renderTooltip(d, event, { pinned: true });
                } else {
                    setTooltipState(false, false);
                }
                if (!hId) rS();
            }
            function onOrbitTitleClick(week) {
                pinNode(weekNodeId[week]);
            }
            function closePinnedTooltip() {
                if (!tipPinnedId) return;
                tipPinnedId = null;
                setTooltipState(false, false);
            }
            function clearPinned() {
                const hadPinned = !!pinnedId || !!tipPinnedId;
                pinnedId = null;
                tipPinnedId = null;
                setTooltipState(false, false);
                if (hadPinned && !hId) rS();
            }
            function eH() {
                return hId || pinnedId;
            }
            function eid(v) {
                return typeof v === "object" ? v.id : v;
            }
            function inC(id) {
                return acId === "all" || nM.get(id)?.cluster === acId;
            }
            function isN(a, b) {
                return adj.get(a)?.has(b) || false;
            }

            const nodeDragBehavior = d3
                .drag()
                .filter(() => !isTouchUI())
                .on("start", (e, d) => {
                    e.sourceEvent.stopPropagation();
                    if (!e.active) sim.alphaTarget(0.24).restart();
                    d.fx = d.x;
                    d.fy = d.y;
                })
                .on("drag", (e, d) => {
                    d.fx = e.x;
                    d.fy = e.y;
                })
                .on("end", (e, d) => {
                    if (!e.active) sim.alphaTarget(0);
                    d.fx = null;
                    d.fy = null;
                });

            function rS() {
                const h = eH();
                nd.each(function (d) {
                    const el = d3.select(this),
                        isH = h === d.id,
                        rH = h ? isN(h, d.id) : false,
                        k = h ? isH || rH : inC(d.id);
                    el.select(".halo").attr(
                        "opacity",
                        k ? 0.5 * d.brightness : 0.06,
                    );
                    el.select(".core")
                        .attr(
                            "fill-opacity",
                            k ? 0.6 + 0.36 * d.brightness : 0.14,
                        )
                        .attr(
                            "stroke-opacity",
                            k ? 0.5 + 0.5 * d.brightness : 0.1,
                        );
                    el.select(".ig").attr(
                        "fill-opacity",
                        k ? 0.4 * d.brightness : 0.03,
                    );
                    el.attr("opacity", k ? 1 : 0.22);
                });
                aLn.attr("stroke-opacity", (d) => {
                    const s = h === d.id,
                        r = h ? isN(h, d.id) : false;
                    if (s) return 0.38;
                    if (r) return 0.22;
                    if (h) return 0.01;
                    if (acId !== "all") return inC(d.id) ? 0.18 : 0.01;
                    return inC(d.id) ? 0.06 : 0.015;
                }).attr("stroke-width", (d) => {
                    if (h === d.id || (h && isN(h, d.id))) return 1.0;
                    if (acId !== "all" && inC(d.id)) return 0.9;
                    return 0.6;
                });
                lk.attr("stroke", (e) => {
                    const s = eid(e.source),
                        t = eid(e.target),
                        r = h && (s === h || t === h);
                    if (r)
                        return e.kind === "echo"
                            ? "rgba(255,255,255,0.45)"
                            : "rgba(255,255,255,0.28)";
                    if (!inC(s) || !inC(t)) return "rgba(255,255,255,0.008)";
                    return "rgba(255,255,255,0.025)";
                }).attr("stroke-width", (e) => {
                    const s = eid(e.source),
                        t = eid(e.target);
                    return h && (s === h || t === h)
                        ? e.kind === "echo"
                            ? 1.8
                            : 1.0
                        : e.kind === "echo"
                          ? 0.5
                          : 0.3;
                });
                conLine.attr("stroke-opacity", (d) => {
                    if (h) return 0;
                    if (P.globalMST) return P.nop * 2.5;
                    let sh = true;
                    if (acId !== "all") sh = d.cluster === acId;
                    return sh ? P.nop * 2.5 : 0.01;
                });
                conOutline.attr("stroke-opacity", 0);
                thL.attr("fill-opacity", (d) => {
                    if (P.pure) return 0;
                    let sh = true;
                    if (h) sh = d.cluster === nM.get(h)?.cluster;
                    else if (acId !== "all") sh = d.cluster === acId;
                    return sh ? 0.32 : 0.06;
                });
                orbitTicks.attr("opacity", (t) => {
                    if (h) {
                        const nid = t.node_id;
                        if (nid === h) return 1;
                        if (isN(h, nid)) return 0.78;
                        return 0.16;
                    }
                    const c = nM.get(t.node_id)?.cluster;
                    return acId === "all" || c === acId ? 1 : 0.16;
                });
                lg.querySelectorAll(".legend-item[data-cluster]").forEach(
                    (el) => {
                        const c = el.dataset.cluster;
                        el.classList.toggle("active", acId === c);
                        el.classList.toggle(
                            "dimmed",
                            acId !== "all" && acId !== c,
                        );
                    },
                );
            }

            function renderPureMode() {
                lg.style.display = P.pure ? "none" : "flex";
                orbitStaticL.attr("display", P.pure ? "none" : null);
                orbitRotL.attr("display", P.pure ? "none" : null);
                thL.attr("display", P.pure ? "none" : null);
                const btn = document.getElementById("pure-mode-btn");
                btn.classList.toggle("active", P.pure);
                btn.textContent = "纯净模式";
                rS();
            }

            function renderGlobalMSTMode() {
                const btn = document.getElementById("global-mst-btn");
                btn.classList.toggle("active", P.globalMST);
                btn.textContent = "全局MST";
                recomputeConstell();
            }

            nd.on("mouseenter", (e, d) => {
                if (isTouchUI()) return;
                if (tipPinnedId) return;
                hId = d.id;
                renderTooltip(d, e);
                rS();
            })
                .on("mousemove", (e) => {
                    if (isTouchUI()) return;
                    if (tipPinnedId) return;
                    mvTip(tp, e);
                })
                .on("mouseleave", () => {
                    if (isTouchUI()) return;
                    if (tipPinnedId) return;
                    hId = null;
                    setTooltipState(false, false);
                    rS();
                })
                .on("click", (e, d) => {
                    e.stopPropagation();
                    hId = null;
                    pinNode(d.id, { showTooltip: true, event: e });
                    rS();
                });
            lkH.on("mouseenter", (e, d) => {
                if (isTouchUI()) return;
                lt.innerHTML = `<div class="link-type">${d.kind === "echo" ? "回声" : "共振"}</div><div>${d.reason || ""}</div>`;
                lt.classList.add("visible");
                mvTip(lt, e);
            })
                .on("mousemove", (e) => {
                    if (isTouchUI()) return;
                    mvTip(lt, e);
                })
                .on("mouseleave", () => lt.classList.remove("visible"));
            nd.call(nodeDragBehavior);
            tp.addEventListener("click", (e) => {
                const closeBtn =
                    e.target instanceof Element
                        ? e.target.closest('[data-role="tooltip-close"]')
                        : null;
                if (closeBtn) {
                    e.stopPropagation();
                    closePinnedTooltip();
                }
            });
            document.addEventListener("click", (e) => {
                if (tp.classList.contains("mobile-sheet")) return;
                if (!(e.target instanceof Element)) return;
                if (e.target.closest(".orbit-title")) return;
                if (e.target.closest("#tooltip")) return;
                clearPinned();
            });
            tpBackdrop.addEventListener("click", (e) => {
                e.stopPropagation();
                clearPinned();
            });

            // Legend
            // Legend (no "全部" — clicking active cluster deselects to show all)
            clusters.forEach((c) => {
                const b = document.createElement("button");
                b.type = "button";
                b.className = "legend-item";
                b.dataset.cluster = c.id;
                b.innerHTML = `<span class="legend-dot" style="background:${c.color}"></span><span>${c.label} · ${c.count}</span>`;
                b.addEventListener("click", () => {
                    acId = acId === c.id ? "all" : c.id;
                    rS();
                });
                lg.appendChild(b);
            });
            rS();

            // Panel
            document
                .getElementById("ptgl")
                .addEventListener("click", () =>
                    document.getElementById("cpanel").classList.toggle("open"),
                );
            function bS(sid, vid, key, apply) {
                const s = document.getElementById(sid),
                    v = document.getElementById(vid);
                s.addEventListener("input", () => {
                    const val = parseFloat(s.value);
                    P[key] = val;
                    v.textContent = val;
                    if (apply) apply(val);
                    sim.alpha(0.3).restart();
                });
            }
            bS("sc", "vc", "cluster");
            bS("so", "vo", "orbit");
            bS("sq", "vq", "charge", (v) => sim.force("charge").strength(v));
            bS("sld", "vld", "ld", (v) =>
                sim
                    .force("link")
                    .distance((e) => (e.kind === "echo" ? v : v * 2)),
            );
            bS("sls", "vls", "ls", (v) =>
                sim
                    .force("link")
                    .strength((e) => (e.kind === "echo" ? v : 0.06)),
            );
            bS("sr", "vr", "rot");
            bS("sp", "vp", "pad", () => {
                conOutline.attr("stroke-width", P.pad + 2.6);
                conLine
                    .attr("stroke-width", P.pad)
                    .attr("stroke-dasharray", "4,3");
            });
            bS("sn", "vn", "nop", () => {
                conLine.attr("stroke-opacity", P.nop * 2.5);
            });
            bS("sfd", "vfd", "flowDur", () => applyConstellFlowVars());
            bS("sfo", "vfo", "flowOffset", () => applyConstellFlowVars());
            document
                .getElementById("pure-mode-btn")
                .addEventListener("click", () => {
                    P.pure = !P.pure;
                    renderPureMode();
                });
            document
                .getElementById("global-mst-btn")
                .addEventListener("click", () => {
                    P.globalMST = !P.globalMST;
                    renderGlobalMSTMode();
                });
            renderPureMode();
            renderGlobalMSTMode();
        </script>
    </body>
</html>
